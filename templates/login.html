<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - CivicPulse</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Poppins", sans-serif;
        min-height: 100vh;
        background: linear-gradient(
          135deg,
          #1a1a2e 0%,
          #16213e 50%,
          #0f3460 100%
        );
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .auth-container {
        width: 100%;
        max-width: 900px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(20px);
        border-radius: 24px;
        overflow: hidden;
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .auth-brand {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        padding: 60px 40px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        color: white;
      }

      .brand-logo {
        font-size: 80px;
        margin-bottom: 20px;
      }

      .brand-name {
        font-size: 32px;
        font-weight: 700;
        margin-bottom: 10px;
      }

      .brand-tagline {
        font-size: 14px;
        opacity: 0.9;
        line-height: 1.6;
      }

      .auth-forms {
        padding: 50px 40px;
        background: rgba(0, 0, 0, 0.2);
      }

      .tabs {
        display: flex;
        margin-bottom: 30px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        padding: 5px;
      }

      .tab-btn {
        flex: 1;
        padding: 12px;
        border: none;
        background: transparent;
        color: rgba(255, 255, 255, 0.6);
        font-family: "Poppins", sans-serif;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        border-radius: 8px;
        transition: all 0.3s ease;
      }

      .tab-btn.active {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
      }

      .form-container {
        display: none;
      }

      .form-container.active {
        display: block;
        animation: fadeIn 0.3s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .form-title {
        color: white;
        font-size: 24px;
        font-weight: 600;
        margin-bottom: 25px;
      }

      .form-group {
        margin-bottom: 20px;
      }

      .form-group label {
        display: block;
        color: rgba(255, 255, 255, 0.8);
        font-size: 13px;
        font-weight: 500;
        margin-bottom: 8px;
      }

      .form-group input {
        width: 100%;
        padding: 14px 16px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 10px;
        color: white;
        font-size: 14px;
        font-family: "Poppins", sans-serif;
        transition: all 0.3s ease;
      }

      .form-group input:focus {
        outline: none;
        border-color: #667eea;
        background: rgba(255, 255, 255, 0.15);
      }

      .form-group input::placeholder {
        color: rgba(255, 255, 255, 0.4);
      }

      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
      }

      .btn-submit {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border: none;
        border-radius: 10px;
        color: white;
        font-size: 15px;
        font-weight: 600;
        font-family: "Poppins", sans-serif;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 10px;
      }

      .btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
      }

      .divider {
        display: flex;
        align-items: center;
        margin: 25px 0;
        color: rgba(255, 255, 255, 0.4);
        font-size: 12px;
      }

      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: rgba(255, 255, 255, 0.2);
      }

      .divider span {
        padding: 0 15px;
      }

      .admin-link {
        text-align: center;
      }

      .admin-link a {
        color: #667eea;
        text-decoration: none;
        font-size: 13px;
        font-weight: 500;
        transition: color 0.3s ease;
      }

      .admin-link a:hover {
        color: #764ba2;
      }

      .message {
        padding: 12px 16px;
        border-radius: 8px;
        margin-bottom: 20px;
        font-size: 13px;
        display: none;
      }

      .message.error {
        background: rgba(239, 68, 68, 0.2);
        border: 1px solid rgba(239, 68, 68, 0.3);
        color: #fca5a5;
        display: block;
      }

      .message.success {
        background: rgba(34, 197, 94, 0.2);
        border: 1px solid rgba(34, 197, 94, 0.3);
        color: #86efac;
        display: block;
      }

      .back-link {
        position: fixed;
        top: 20px;
        left: 20px;
        color: white;
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 14px;
        opacity: 0.8;
        transition: opacity 0.3s ease;
      }

      .back-link:hover {
        opacity: 1;
      }

      @media (max-width: 768px) {
        .auth-container {
          grid-template-columns: 1fr;
          max-width: 400px;
        }

        .auth-brand {
          padding: 40px 30px;
        }

        .brand-logo {
          font-size: 50px;
        }

        .brand-name {
          font-size: 24px;
        }

        .auth-forms {
          padding: 30px;
        }

        .form-row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <a href="/" class="back-link">← Back to Dashboard</a>

    <div class="auth-container">
      <div class="auth-brand">
        <div class="brand-logo">🏛️</div>
        <div class="brand-name">CivicPulse</div>
        <div class="brand-tagline">
          Smart Public Issue & Emergency Intelligence System
          <br /><br />
          Report issues • Track progress • Make your city better
        </div>
      </div>

      <div class="auth-forms">
        <div class="tabs">
          <button class="tab-btn active" data-tab="login">Login</button>
          <button class="tab-btn" data-tab="register">Register</button>
        </div>

        <div id="message" class="message"></div>

        <!-- Login Form -->
        <div id="login-form" class="form-container active">
          <h2 class="form-title">Welcome Back</h2>
          <form id="loginForm">
            <div class="form-group">
              <label>Username</label>
              <input
                type="text"
                name="username"
                placeholder="Enter your username"
                required
              />
            </div>
            <div class="form-group">
              <label>Password</label>
              <input
                type="password"
                name="password"
                placeholder="Enter your password"
                required
              />
            </div>
            <button type="submit" class="btn-submit">Login</button>
          </form>

          <div class="divider"><span>OR</span></div>

          <div class="admin-link">
            <a href="/admin">Login as Administrator →</a>
          </div>
        </div>

        <!-- Register Form -->
        <div id="register-form" class="form-container">
          <h2 class="form-title">Create Account</h2>
          <form id="registerForm">
            <div class="form-group">
              <label>Full Name</label>
              <input
                type="text"
                name="name"
                placeholder="Enter your full name"
                required
              />
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Username</label>
                <input
                  type="text"
                  name="username"
                  placeholder="Choose username"
                  required
                />
              </div>
              <div class="form-group">
                <label>Phone (WhatsApp)</label>
                <input
                  type="tel"
                  name="phone"
                  placeholder="+91 9876543210"
                  required
                />
                <small style="color: #888; font-size: 0.8rem"
                  >Include country code for WhatsApp notifications</small
                >
              </div>
            </div>
            <div class="form-group">
              <label>Email</label>
              <input
                type="email"
                name="email"
                placeholder="Enter your email"
                required
              />
            </div>
            <div class="form-group">
              <label>Address (Optional)</label>
              <input type="text" name="address" placeholder="Your address" />
            </div>
            <div class="form-group">
              <label>Password</label>
              <input
                type="password"
                name="password"
                placeholder="Create password (min 6 chars)"
                required
                minlength="6"
              />
            </div>
            <button type="submit" class="btn-submit">Create Account</button>
          </form>
        </div>
      </div>
    </div>

    <script>
      // Tab switching
      document.querySelectorAll(".tab-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          document
            .querySelectorAll(".tab-btn")
            .forEach((b) => b.classList.remove("active"));
          document
            .querySelectorAll(".form-container")
            .forEach((f) => f.classList.remove("active"));

          btn.classList.add("active");
          document
            .getElementById(btn.dataset.tab + "-form")
            .classList.add("active");
          hideMessage();
        });
      });

      function showMessage(text, type) {
        const msg = document.getElementById("message");
        msg.textContent = text;
        msg.className = "message " + type;
      }

      function hideMessage() {
        document.getElementById("message").className = "message";
      }

      // Login form
      document
        .getElementById("loginForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const formData = new FormData(e.target);
          const data = Object.fromEntries(formData);

          try {
            const res = await fetch("/api/auth/login", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(data),
              credentials: "include",
            });

            const result = await res.json();

            if (res.ok) {
              showMessage("Login successful! Redirecting...", "success");
              setTimeout(() => (window.location.href = "/"), 1000);
            } else {
              showMessage(result.error || "Login failed", "error");
            }
          } catch (err) {
            showMessage("Connection error. Please try again.", "error");
          }
        });

      // Register form
      document
        .getElementById("registerForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const formData = new FormData(e.target);
          const data = Object.fromEntries(formData);

          try {
            const res = await fetch("/api/auth/register", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(data),
              credentials: "include",
            });

            const result = await res.json();

            if (res.ok) {
              showMessage("Account created! Redirecting...", "success");
              setTimeout(() => (window.location.href = "/"), 1000);
            } else {
              showMessage(result.error || "Registration failed", "error");
            }
          } catch (err) {
            showMessage("Connection error. Please try again.", "error");
          }
        });
    </script>
  </body>
</html>
